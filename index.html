<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Joshua William | Portfolio</title>
  <!-- Google Fonts: dynamic and modern -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #03020a;
      font-family: 'Space Grotesk', sans-serif;
      color: #f0f0f8;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* custom cursor trail effect (canvas overlay for animated vibe) */
    #cursorCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* main container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
      position: relative;
      z-index: 2;
    }

    /* header / navigation */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 4rem;
      border-bottom: 1px solid rgba(255, 90, 150, 0.3);
      padding-bottom: 1.5rem;
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      font-family: 'Syne', sans-serif;
      background: linear-gradient(125deg, #ff5a96, #ffb347, #6c5ce7);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmer 4s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    .nav-links {
      display: flex;
      gap: 2.2rem;
    }
    .nav-links a {
      color: #bfc9e6;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: 0.25s;
      letter-spacing: 1px;
    }
    .nav-links a:hover {
      color: #ffb347;
      text-shadow: 0 0 6px #ffb347;
    }

    /* intro with animated headline */
    .intro {
      margin-bottom: 5rem;
      position: relative;
    }
    .glow-text {
      font-size: 4.2rem;
      font-weight: 800;
      font-family: 'Syne', sans-serif;
      line-height: 1.1;
      background: linear-gradient(135deg, #ffffff, #ffb8d0, #a56eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1.2rem;
    }
    .typed-container {
      font-size: 1.4rem;
      color: #bdc4f0;
      border-left: 3px solid #ff5a96;
      padding-left: 1.5rem;
      margin-top: 1rem;
    }
    .highlight {
      color: #ffb347;
      font-weight: 600;
    }

    /* filter bar for animation categories */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin: 2rem 0 3rem;
    }
    .filter-chip {
      background: rgba(20, 16, 40, 0.7);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 90, 150, 0.4);
      padding: 0.6rem 1.6rem;
      border-radius: 60px;
      font-family: 'Space Grotesk', monospace;
      font-weight: 500;
      font-size: 0.85rem;
      color: #e2e8ff;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }
    .filter-chip i {
      margin-right: 8px;
    }
    .filter-chip.active {
      background: #ff5a96;
      border-color: #ff5a96;
      color: #0a0418;
      box-shadow: 0 0 14px rgba(255, 90, 150, 0.5);
    }
    .filter-chip:hover:not(.active) {
      border-color: #ffb347;
      color: #ffb347;
    }

    /* gallery grid — animation showcase */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      margin: 2rem 0 4rem;
    }
    .anim-card {
      background: rgba(12, 10, 26, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.2, 0.95, 0.4, 1.1);
      border: 1px solid rgba(255, 100, 150, 0.2);
      cursor: pointer;
      transform: translateY(0);
    }
    .anim-card:hover {
      transform: translateY(-10px) scale(1.01);
      border-color: rgba(255, 179, 71, 0.7);
      box-shadow: 0 30px 40px -15px rgba(0,0,0,0.6);
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #000;
    }
    .anim-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      display: block;
    }
    .anim-card:hover .anim-video {
      transform: scale(1.02);
    }
    .play-overlay {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 5px 10px;
      font-size: 0.7rem;
      color: #ffb347;
      font-weight: bold;
      pointer-events: none;
    }
    .card-info {
      padding: 1.2rem 1.2rem 1.4rem;
    }
    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .card-cat {
      font-size: 0.7rem;
      background: rgba(255, 90, 150, 0.25);
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      font-family: monospace;
      color: #ffb6d0;
    }
    .card-desc {
      font-size: 0.85rem;
      color: #b7c2e8;
      margin-top: 0.5rem;
      line-height: 1.4;
    }

    /* lightbox / video modal for full animation preview */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(3, 2, 15, 0.96);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      visibility: hidden;
      opacity: 0;
      transition: all 0.25s ease;
    }
    .modal.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-content {
      max-width: 85vw;
      width: 900px;
      position: relative;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 25px 45px rgba(0,0,0,0.5);
      border: 1px solid rgba(255, 179, 71, 0.5);
    }
    .modal-video {
      width: 100%;
      display: block;
      background: black;
    }
    .modal-caption {
      background: rgba(0,0,0,0.7);
      padding: 1rem;
      text-align: center;
      color: #ffb347;
      font-weight: 500;
    }
    .close-modal {
      position: absolute;
      top: -40px;
      right: 0;
      background: none;
      border: none;
      font-size: 2rem;
      color: white;
      cursor: pointer;
    }

    /* about / reel section */
    .reel-section {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      background: linear-gradient(125deg, #0d0b1a, #08061a);
      border-radius: 3rem;
      padding: 2.5rem;
      margin: 3rem 0;
      border: 1px solid rgba(255, 90, 150, 0.3);
    }
    .reel-text {
      flex: 1.5;
    }
    .reel-text h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin: 1.5rem 0;
    }
    .skill-tag {
      background: rgba(255, 90, 150, 0.2);
      border-radius: 60px;
      padding: 0.3rem 1rem;
      font-size: 0.75rem;
      font-family: monospace;
    }
    .showreel-link {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      background: #ff5a96;
      border: none;
      padding: 0.8rem 1.8rem;
      border-radius: 40px;
      font-weight: bold;
      color: #03020a;
      margin-top: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .stats-mini {
      flex: 1;
      background: rgba(0,0,0,0.4);
      border-radius: 2rem;
      padding: 1.5rem;
      text-align: center;
    }
    .stat-num {
      font-size: 2.5rem;
      font-weight: 800;
      color: #ffb347;
    }

    /* contact */
    .contact-links {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid #2a2740;
      margin-top: 2rem;
    }
    .contact-links a {
      color: #ffb347;
      margin: 0 1.2rem;
      font-size: 1.2rem;
      transition: 0.2s;
    }
    footer {
      text-align: center;
      font-size: 0.7rem;
      color: #5a5580;
      margin-top: 1.5rem;
    }

    @media (max-width: 760px) {
      .container { padding: 1.2rem; }
      .glow-text { font-size: 2.5rem; }
      .typed-container { font-size: 1rem; }
      .filter-chip { padding: 0.4rem 1rem; font-size: 0.7rem; }
    }
  </style>
</head>
<body>

<!-- animated cursor trail canvas -->
<canvas id="cursorCanvas"></canvas>

<div class="container">
  <div class="hero">
    <div class="logo">⟡ JOSHUA WILLIAM//MOSTLY EDIBLE</div>
    <div class="nav-links">
      <a href="#" data-nav="gallery">WORKS</a>
      <a href="#" data-nav="contact">CONTACT</a>
    </div>
  </div>

  <div class="intro">
    <div class="glow-text">animation, illustration,<br>music production</div>
  </div>

  <div class="filter-bar" id="filterBar"></div>
  <div class="gallery" id="galleryGrid"></div>

  <footer>© 2025 — mostly edible</footer>
</div>

<!-- modal for video playback -->
<div id="videoModal" class="modal">
  <div class="modal-content">
    <button class="close-modal" id="closeModalBtn">&times;</button>
    <video id="modalVideoPlayer" class="modal-video" controls autoplay muted loop>
      <source src="" type="video/mp4">
    </video>
    <div class="modal-caption" id="modalCaption"></div>
  </div>
</div>

<script>
  // ---------- ANIMATION PORTFOLIO DATA (CUSTOMIZABLE) ----------
  // Each entry: video source (can be local or external demo). 
  // For GitHub Pages, place mp4 files in "videos/" folder and use relative paths.
  // Here we use sample public domain / demo-friendly clips from "sample videos" (short loops)
  // To make it functional without external hosting, we use inline example videos from placeholder sources
  // But you can replace with your own .mp4 links.
  const animations = [
    {
      id: 1,
      title: "SCARY GREEN MAN",
      category: "Mixed",
      description: "Hand-drawn rotoscope experiment, 60fps loop — exploration of light refraction.",
      videoSrc: "https://youtu.be/hHFsuFah3Sw"
    },
    {
      id: 2,
      title: "METAMORPH",
      category: "3D",
      description: "Blender cycles, surreal transformation of organic geometry.",
      videoSrc: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4"
    },
    {
      id: 3,
      title: "RHYTHM ZERO",
      category: "motion graphics",
      description: "Abstract typographic animation with dynamic music sync.",
      videoSrc: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFunflies.mp4"
    },
    {
      id: 4,
      title: "LOST TAPESTRY",
      category: "2D",
      description: "Frame by frame charcoal animation, poetic narrative short (excerpt).",
      videoSrc: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4"
    },
    {
      id: 5,
      title: "KINETIC SCULPTURE",
      category: "3D",
      description: "Procedural geometry nodes, real-time simulated particles.",
      videoSrc: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/SubaruOutbackOnStreetAndDirt.mp4"
    },
    {
      id: 6,
      title: "NEON DRIFTER",
      category: "motion graphics",
      description: "Vaporwave inspired loop, after effects + cell shading.",
      videoSrc: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/WhatCar.mp4"
    }
  ];

  // unique categories
  function getUniqueCats() {
    const cats = animations.map(a => a.category);
    return ['all', ...new Set(cats)];
  }

  let currentFilter = 'all';
  let currentAnimations = [...animations];

  // render gallery grid with videos
  function renderGallery() {
    const galleryContainer = document.getElementById('galleryGrid');
    const filtered = currentFilter === 'all' 
      ? animations 
      : animations.filter(anim => anim.category.toLowerCase() === currentFilter.toLowerCase());
    
    if(filtered.length === 0) {
      galleryContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;">✨ no animations match — try another category ✨</div>`;
      return;
    }
    
    galleryContainer.innerHTML = filtered.map(anim => `
      <div class="anim-card" data-id="${anim.id}">
        <div class="video-wrapper">
          <video class="anim-video" muted loop playsinline preload="metadata">
            <source src="${anim.videoSrc}" type="video/mp4">
          </video>
          <div class="play-overlay"><i class="fas fa-expand"></i> preview</div>
        </div>
        <div class="card-info">
          <div class="card-title">
            <span>${anim.title}</span>
            <span class="card-cat">${anim.category}</span>
          </div>
          <div class="card-desc">${anim.description}</div>
        </div>
      </div>
    `).join('');

    // attach hover video play/pause for micro-interaction (unique animation preview)
    document.querySelectorAll('.anim-card').forEach(card => {
      const videoEl = card.querySelector('.anim-video');
      if(videoEl) {
        card.addEventListener('mouseenter', () => {
          videoEl.play().catch(e => console.log("autoplay blocked, hover interaction fine"));
        });
        card.addEventListener('mouseleave', () => {
          videoEl.pause();
          videoEl.currentTime = 0;
        });
      }
      // modal open on click
      card.addEventListener('click', (e) => {
        const id = parseInt(card.getAttribute('data-id'));
        const anim = animations.find(a => a.id === id);
        if(anim) openVideoModal(anim);
      });
    });
  }

  // modal handler
  const modal = document.getElementById('videoModal');
  const modalVideo = document.getElementById('modalVideoPlayer');
  const modalCaptionSpan = document.getElementById('modalCaption');

  function openVideoModal(anim) {
    modalVideo.src = anim.videoSrc;
    modalCaptionSpan.innerText = `${anim.title} — ${anim.category} / ${anim.description}`;
    modal.classList.add('active');
    modalVideo.load();
    modalVideo.play().catch(e => console.log("autoplay blocked"));
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.classList.remove('active');
    modalVideo.pause();
    modalVideo.src = '';
    document.body.style.overflow = '';
  }

  // build filter chips
  function buildFilters() {
    const filterContainer = document.getElementById('filterBar');
    const categories = getUniqueCats();
    filterContainer.innerHTML = categories.map(cat => `
      <div class="filter-chip ${cat === currentFilter ? 'active' : ''}" data-filter="${cat}">
        <i class="fas ${cat === 'all' ? 'fa-film' : (cat === '2D' ? 'fa-pen-fancy' : (cat === '3D' ? 'fa-cube' : 'fa-chart-line'))}"></i>
        ${cat === 'all' ? 'ALL REELS' : cat.toUpperCase()}
      </div>
    `).join('');
    
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', (e) => {
        const filterVal = chip.getAttribute('data-filter');
        if(filterVal === currentFilter) return;
        currentFilter = filterVal;
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        renderGallery();
        document.getElementById('galleryGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  }

  // Showreel button (watch featured showreel)
  function setupShowreel() {
    const btn = document.getElementById('showreelBtn');
    if(btn) {
      btn.addEventListener('click', () => {
        // demo showreel: use first animation as a placeholder or external link
        const demoReel = {
          title: "SHOWREEL 2025 - MOTION CANVAS",
          category: "reel",
          description: "Collection of best works: 2D/3D & motion experiments",
          videoSrc: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/WhatCar.mp4"
        };
        openVideoModal(demoReel);
      });
    }
  }

  // dynamic text role (animation)
  const roles = ["2D Animator", "Motion Designer", "Frame Weaver", "Visual Storyteller"];
  let idx = 0;
  function animateRole() {
    const roleSpan = document.getElementById('dynamicRole');
    if(roleSpan) {
      roleSpan.textContent = roles[idx % roles.length];
      idx++;
      setTimeout(animateRole, 2000);
    }
  }

  // smooth nav
  function navScroll() {
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const target = link.getAttribute('data-nav');
        if(target === 'gallery') document.getElementById('galleryGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
        if(target === 'reel') document.getElementById('reelSection').scrollIntoView({ behavior: 'smooth', block: 'center' });
        if(target === 'contact') document.getElementById('contactSection').scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    });
  }

  // ---- CURSOR TRAIL ANIMATION (canvas effect) ----
  const canvas = document.getElementById('cursorCanvas');
  const ctx = canvas.getContext('2d');
  let trail = [];
  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  
  let mouseX = 0, mouseY = 0;
  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    trail.push({ x: mouseX, y: mouseY, alpha: 0.8 });
    if(trail.length > 20) trail.shift();
  });
  
  function drawTrail() {
    if(!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for(let i = 0; i < trail.length; i++) {
      const p = trail[i];
      const size = 6 * (i / trail.length);
      ctx.beginPath();
      ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 130, 100, ${p.alpha * 0.4})`;
      ctx.fill();
      p.alpha -= 0.02;
    }
    trail = trail.filter(p => p.alpha > 0);
    requestAnimationFrame(drawTrail);
  }
  drawTrail();
  
  // modal close events
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => {
    if(e.target === modal) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && modal.classList.contains('active')) closeModal();
  });

  // init all
  function init() {
    buildFilters();
    renderGallery();
    navScroll();
    setupShowreel();
    animateRole();
    // auto preload interactions on cards
  }
  init();
</script>
</body>
</html>
